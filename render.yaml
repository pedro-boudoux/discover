services:
  - type: web
    name: music-discovery-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LASTFM_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: music-discovery-db
          property: connectionString

databases:
  - name: music-discovery-db
    plan: free
